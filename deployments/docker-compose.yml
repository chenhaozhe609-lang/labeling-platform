# 开发期数据栈：meta-db + source-db + redis（对齐 PRD §13.1）
# 后端/前端在本地用 `go run` / `npm run dev` 跑，连这里的端口。
# 启动：docker compose -f deployments/docker-compose.yml up -d
#
# 注意：宿主端口刻意避开 5432/6379，以便与 admission 项目（占用这两个端口）并存。
#   meta-db   宿主 5442 → 容器 5432
#   source-db 宿主 5433 → 容器 5432
#   redis     宿主 6380 → 容器 6379

name: labeling

services:
  # 平台自身数据库：users / datasets / tasks / annotations
  meta-db:
    image: postgres:17
    container_name: labeling-meta-db
    environment:
      POSTGRES_USER: labeling
      POSTGRES_PASSWORD: labeling
      POSTGRES_DB: labeling_meta
    ports:
      - "5442:5432"
    volumes:
      - meta_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labeling -d labeling_meta"]
      interval: 5s
      timeout: 3s
      retries: 12

  # 沙箱数据库：恢复用户上传的 dump（独立实例 + 资源限制，防恶意 dump）
  source-db:
    image: postgres:17
    container_name: labeling-source-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sandbox_template
    ports:
      - "5433:5432"
    volumes:
      - source_pgdata:/var/lib/postgresql/data
      - ./source-init:/docker-entrypoint-initdb.d:ro
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sandbox_template"]
      interval: 5s
      timeout: 3s
      retries: 12

  # 限流 / 心跳缓存
  redis:
    image: redis:7-alpine
    container_name: labeling-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  meta_pgdata:
  source_pgdata:
