# 前端 nginx：静态资源 + SPA 路由回退 + /api 反代到后端容器。
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 上传 dump 可能较大，放宽请求体上限（与后端 UPLOAD_MAX_MB 对齐）。
    client_max_body_size 512m;

    # 安全响应头（Phase 4 硬化）。HSTS 仅经 HTTPS 暴露时生效，HTTP 下浏览器忽略。
    # CSP：构建产物无内联脚本（仅外部 module script），故 script-src 'self' 可严格收紧——
    # 关键 XSS 缓解（token 存 localStorage）；style 因 recharts/内联样式需 'unsafe-inline'。
    # 注：location 块若自带 add_header 会丢失这些继承（见下方 /assets/ 重申 nosniff）。
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # API 反代到后端服务（compose 网络内服务名 backend:8090）。
    location /api/ {
        proxy_pass http://backend:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s; # 导出/恢复等长请求
    }

    # 带哈希的构建资源长缓存。本块自带 add_header 会覆盖继承，故重申最关键的 nosniff。
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # SPA：未命中的路由交给前端 router。
    location / {
        try_files $uri $uri/ /index.html;
    }
}
